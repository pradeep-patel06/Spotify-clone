<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spotify Clone V4</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="main">



<div class="sidebar">

<h2>Spotify 🎧</h2>

<ul>

<li onclick="showPlaylist('all')">🏠 All Songs</li>
<li onclick="showPlaylist('fav')">❤️ Favourites</li>
<li onclick="showPlaylist('recent')">🕒 Recently Played</li>

</ul>

<button id="createPlaylist">➕ Create Playlist</button>

<button id="toggleTheme">🌙 Toggle Mode</button>

</div>


<div class="content">

<div class="searchBox">

<input type="text" id="search" placeholder="🔍 Search song...">
<button id="clearSearch">❌</button>

</div>

<div id="playlist"></div>

<div id="notFound">❌ Song Not Found</div>

</div>

</div>



<div class="player">

<div class="player-left">

<img id="thumbnail" src="images/img1.jpg">
<span id="songName">No Song Playing</span>

</div>

<div class="player-center">

<div class="equalizer">

<span></span>
<span></span>
<span></span>

</div>

<button id="shuffle">🔀</button>
<button id="prev">⏮</button>
<button id="play">▶</button>
<button id="next">⏭</button>
<button id="repeat">🔁</button>

<br>

<input type="range" id="progress" min="0" max="100" value="0">

<p id="time">00:00 / 00:00</p>

</div>

<div class="player-right">

<button id="mute">🔊</button>

<input
type="range"
id="volume"
min="0"
max="1"
step="0.01"
value="1">

</div>

</div>

<script src="script.js"></script>

</body>
</html>
